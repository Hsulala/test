<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>續約資訊回報</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        h3 { color: #463629; }
        input { 
            width: 100%; padding: 12px; margin: 15px 0; 
            box-sizing: border-box; font-size: 16px; 
            border: 1px solid #ccc; border-radius: 4px;
        }
        button { 
            width: 100%; padding: 15px; background: #463629; 
            color: white; border: none; border-radius: 5px; 
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <h3 id="title">資訊回報</h3>
    <input type="text" id="dataInput" inputmode="decimal" pattern="[0-9]*" placeholder="請輸入號碼">
    <button id="sendBtn" onclick="sendData()">確認送出</button>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const type = urlParams.get('type');
        if(type === 'remit') document.getElementById('title').innerText = "回報匯款末五碼";
        if(type === 'cheque') document.getElementById('title').innerText = "回報掛號單號";

        // 初始化 LIFF
        liff.init({ liffId: "2007905512-tXrWly6E" }).then(() => {
            if (!liff.isLoggedIn()) {
                liff.login();
            }
        }).catch((err) => {
            console.error("LIFF Initialization failed", err);
        });

        function sendData() {
            const val = document.getElementById('dataInput').value.trim();
            if (!val) {
                alert("請輸入號碼");
                return;
            }

            const prefix = (type === 'remit') ? "匯款：" : "掛號：";
            
            // 使用 liff.sendMessages 將訊息傳回對話框
            liff.sendMessages([{
                type: 'text',
                text: `【系統回報】${prefix}${val}`
            }]).then(() => {
                liff.closeWindow(); // 成功後關閉
            }).catch((err) => {
                alert("錯誤：" + JSON.stringify(err));
            });
        }
    </script>
</body>
</html>
