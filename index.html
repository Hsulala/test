<script>
    // ⚠️ 這裡一定要換成 GAS 部署後的「網頁應用程式網址」
    const gasWebUrl = "https://script.google.com/macros/s/XXXXX/exec"; 
    let remitType = new URLSearchParams(window.location.search).get('type');
    let gId = "";

    // 初始化 UI
    const form = document.getElementById('formArea');
    if(remitType === 'remit') {
        document.getElementById('title').innerText = "回報匯款末五碼";
        form.innerHTML = '<input type="text" id="code" inputmode="decimal" placeholder="請輸入末五碼">';
    } else {
        document.getElementById('title').innerText = "索取回郵信封";
        form.innerHTML = '<div class="label">收件人</div><input type="text" id="name">' +
                         '<div class="label">電話</div><input type="text" id="phone" inputmode="tel">' +
                         '<div class="label">收件地址</div><input type="text" id="addr">';
    }

    liff.init({ liffId: "2007905512-tXrWly6E" }).then(() => {
        if (!liff.isLoggedIn()) {
            liff.login();
        } else {
            const context = liff.getContext();
            gId = context.groupId || context.userId; // 如果在群組就抓 groupId
            document.getElementById('loading').innerText = "系統已就緒 (ID: " + (gId ? "OK" : "N/A") + ")";
        }
    }).catch(err => alert("LIFF 初始化失敗: " + err));

    function submitForm() {
        const btn = document.getElementById('submitBtn');
        if (!gId) {
            alert("找不到群組資訊，請從 LINE 群組內開啟此連結");
            return;
        }

        btn.disabled = true;
        btn.innerText = "傳送中...";

        let query = `?groupId=${gId}&type=${remitType}`;
        if(remitType === 'remit') {
            const code = document.getElementById('code').value;
            if(!code) return alert("請輸入末五碼");
            query += `&code=${code}`;
        } else {
            const n = document.getElementById('name').value;
            const p = document.getElementById('phone').value;
            const a = document.getElementById('addr').value;
            if(!n || !p || !a) return alert("請填寫完整資訊");
            query += `&name=${encodeURIComponent(n)}&phone=${encodeURIComponent(p)}&addr=${encodeURIComponent(a)}`;
        }

        // 使用 fetch 傳送
        fetch(gasWebUrl + query, { method: 'GET', mode: 'no-cors' })
        .then(() => {
            alert("回報成功！視窗即將關閉");
            liff.closeWindow();
        })
        .catch(err => {
            alert("傳送失敗：" + err);
            btn.disabled = false;
            btn.innerText = "確認送出";
        });
    }
</script>
