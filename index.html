<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>資訊回報</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #463629; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; width: 100%; }
        .label { font-size: 14px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h3 id="title">載入中...</h3>
    <div id="formArea"></div>
    <button id="submitBtn" onclick="submitData()">確認送出</button>

    <script>
        // ⚠️ 這裡一定要貼上你最新的 GAS 網址 (/exec 結尾)
        const gasWebUrl = "https://script.google.com/macros/s/AKfycbyjzlnr8DFF5FRnfGeImwcbIUrgRIFf40XsOazHGCcsOWkxZbn_IAUCy-PCpXV5N3lv/exec"; 
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');
        let groupId = "";

        const form = document.getElementById('formArea');
        if (type === 'remit') {
            document.getElementById('title').innerText = "回報匯款末五碼";
            form.innerHTML = '<input type="text" id="code" inputmode="decimal" placeholder="請輸入末五碼">';
        } else {
            document.getElementById('title').innerText = "索取回郵信封";
            form.innerHTML = '<div class="label">收件人姓名</div><input type="text" id="name">' +
                             '<div class="label">聯絡電話</div><input type="text" id="phone" inputmode="tel">' +
                             '<div class="label">收件地址</div><input type="text" id="addr">';
        }

        liff.init({ liffId: "2007905512-tXrWly6E" }).then(() => {
            const context = liff.getContext();
            groupId = context.groupId || context.userId;
            document.getElementById('title').append(" (已就緒)");
        });

        function submitData() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            let query = `?groupId=${groupId}&type=${type}`;
            if (type === 'remit') {
                const c = document.getElementById('code').value;
                if(!c) return alert("請輸入末五碼");
                query += `&code=${c}`;
            } else {
                const n = document.getElementById('name').value;
                const p = document.getElementById('phone').value;
                const a = document.getElementById('addr').value;
                if(!n || !p || !a) return alert("請完整填寫");
                query += `&name=${encodeURIComponent(n)}&phone=${encodeURIComponent(p)}&addr=${encodeURIComponent(a)}`;
            }

            // 使用背景傳輸，資料不會出現在聊天室
            fetch(gasWebUrl + query, { mode: 'no-cors' }).then(() => {
                alert("回報成功！資料已隱密傳輸。");
                liff.closeWindow();
            }).catch(err => alert("出錯了：" + err));
        }
    </script>
</body>
</html>
