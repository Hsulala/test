<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>資訊回報</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        input { width: 100%; padding: 15px; margin-bottom: 10px; box-sizing: border-box; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #463629; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; }
        .label { font-size: 14px; color: #666; margin-bottom: 5px; }
    </style>
</head>
<body>
    <h3 id="title">載入中...</h3>
    <div id="formArea"></div>
    <button onclick="sendData()">確認送出</button>

    <script>
        const params = new URLSearchParams(window.location.search);
        const type = params.get('type');

        const form = document.getElementById('formArea');
        if (type === 'remit') {
            document.getElementById('title').innerText = "回報匯款末五碼";
            form.innerHTML = '<input type="text" id="code" inputmode="decimal" placeholder="請輸入末五碼">';
        } else {
            document.getElementById('title').innerText = "索取回郵信封";
            form.innerHTML = '<div class="label">收件人</div><input type="text" id="name">' +
                             '<div class="label">電話</div><input type="text" id="phone" inputmode="tel">' +
                             '<div class="label">地址</div><input type="text" id="addr">';
        }

        liff.init({ liffId: "2007905512-tXrWly6E" }).then(() => {
            if (!liff.isLoggedIn()) liff.login();
        });

        function sendData() {
            let text = "";
            if (type === 'remit') {
                const c = document.getElementById('code').value;
                if(!c) return alert("請輸入末五碼");
                text = `【系統回報】匯款：${c}`;
            } else {
                const n = document.getElementById('name').value;
                const p = document.getElementById('phone').value;
                const a = document.getElementById('addr').value;
                if(!n || !p || !a) return alert("請完整填寫資訊");
                text = `【系統回報】地址：${n} / ${p} / ${a}`;
            }

            // 直接呼叫 LINE 的傳送訊息功能 (這最穩定！)
            liff.sendMessages([{ type: 'text', text: text }]).then(() => {
                liff.closeWindow();
            }).catch(err => alert("失敗：" + err));
        }
    </script>
</body>
</html>
