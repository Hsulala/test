<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>資訊回報</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; background-color: #f8f9fa; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; box-sizing: border-box; border-radius: 4px; border: 1px solid #ccc; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #463629; color: white; border: none; border-radius: 8px; font-weight: bold; }
        .label { font-size: 14px; color: #666; margin-bottom: 5px; text-align: left; }
    </style>
</head>
<body>
    <h3 id="title">載入中...</h3>
    <div id="formArea"></div>
    <button id="submitBtn" onclick="submitForm()">確認送出</button>

    <script>
        const gasWebUrl = "你的_GAS_網頁應用程式網址"; // 👈 貼上 GAS 的部署網址
        let remitType = new URLSearchParams(window.location.search).get('type');
        let gId = "";

        // 初始化 UI
        const form = document.getElementById('formArea');
        if(remitType === 'remit') {
            document.getElementById('title').innerText = "回報匯款末五碼";
            form.innerHTML = '<input type="text" id="code" inputmode="decimal" placeholder="請輸入末五碼">';
        } else {
            document.getElementById('title').innerText = "索取回郵信封";
            form.innerHTML = '<div class="label">收件人</div><input type="text" id="name">' +
                             '<div class="label">電話</div><input type="text" id="phone" inputmode="tel">' +
                             '<div class="label">收件地址</div><input type="text" id="addr">';
        }

        liff.init({ liffId: "2007905512-tXrWly6E" }).then(() => {
            const context = liff.getContext();
            gId = context.groupId; // 自動抓取群組 ID
        });

        function submitForm() {
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerText = "傳送中...";

            let query = `?groupId=${gId}&type=${remitType}`;
            if(remitType === 'remit') {
                query += `&code=${document.getElementById('code').value}`;
            } else {
                query += `&name=${document.getElementById('name').value}&phone=${document.getElementById('phone').value}&addr=${document.getElementById('addr').value}`;
            }

            // 後台傳送資料給 GAS
            fetch(gasWebUrl + query, { mode: 'no-cors' }).then(() => {
                alert("回報成功！視窗即將關閉");
                liff.closeWindow();
            }).catch(err => alert("出錯了：" + err));
        }
    </script>
</body>
</html>
